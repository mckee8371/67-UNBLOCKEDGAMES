<body>
  <style>
  body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
      text-align: center;
  }
  h1, h2, h3, h4 {
      color: #fff;
      margin: 10px 0;
      font-weight: 700;
      letter-spacing: -0.02em;
  }
  h1 { font-size: 2.5rem; }
  h2 { font-size: 1.8rem; }
  h3 { font-size: 1.2rem; color: #888; }
  p { color: #aaa; }
  button {
      background-color: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      outline: none;
  }
  button:hover {
      background-color: #fff;
      color: #000;
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
  }
  button:active { transform: translateY(0); }
  hr {
      border: 0;
      border-top: 1px solid #222;
      margin: 30px auto;
      width: 100%;
  }
  .nav-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
  }
  .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      padding: 40px 0;
      max-width: 1400px;
      margin: 0 auto;
  }
  .game-btn {
      height: 180px !important;
      width: 100% !important;
      margin: 0 !important;
      border: 3px solid #222 !important;
      border-radius: 16px !important;
      filter: grayscale(1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background-color: #000;
  }
  .game-btn:hover {
      filter: grayscale(0);
      border-color: #fff !important;
      transform: scale(1.05) translateY(-8px);
      box-shadow: 0 20px 40px rgba(255, 255, 255, 0.2);
      z-index: 10;
  }
  img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 20px 0;
  }
  </style>
  <head>
    <div class="nav-container">
      <button onclick="window.location.href='index.html';">HOME</button>
      <button onclick="window.location.href='games.html';">GAMES</button>
      <button onclick="window.location.href='proxies.html';">PROXIES</button>
      <button onclick="window.location.href='settings.html';">SETTINGS</button>
      <button onclick="window.location.href='credits.html';">CREDITS</button>
      <button onclick="window.location.href='movies.html';">MOVIES</button>
      <button onclick="window.location.href='chat.html';">CHAT</button>
      <button onclick="window.location.href='updates.html';">UPDATES</button>
    </div>

    <hr>
    <h1>67 UNBLOCKED GAMES</h1>
    <h2>Proxies</h2>

    <div style="margin: 20px auto; max-width: 600px; display: flex; gap: 10px;">
      <input type="text" id="gameSearch" placeholder="Search for a proxy..."
        style="flex: 1; padding: 12px 20px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 16px; outline: none;">
    </div>

    <script src="script.js"></script>

    <hr>

    <div class="game-grid">
      <button onclick="window.location.href='games/proxy/index.html'" class="game-btn" style="background-image: url('images/www.png'); background-position: center; background-size: cover;">GhostLink</button>
      <!-- proxies end here -->
    </div>

    <hr>

  </head>
<script src="gate.js"></script>
<script src="update-popup.js"></script>
<script src="notice.js"></script>
<script src="announcement.js"></script>
<script src="particles.js"></script>
</body>
